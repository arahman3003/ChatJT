<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forum Chat Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box;font-family:Arial,sans-serif}
    body{margin:0;min-height:100vh;background:#020617;color:#fff}
    button{border:none;cursor:pointer;transition:.2s;font-weight:bold}
    button:hover{transform:translateY(-1px)}
    input{border:none;outline:none;color:#fff}
    .login-page{min-height:100vh;display:flex;justify-content:center;align-items:center;padding:18px;background:radial-gradient(circle at top left,rgba(34,197,94,.15),transparent 30%),radial-gradient(circle at bottom right,rgba(56,189,248,.13),transparent 30%),#020617}
    .login-card{width:100%;max-width:410px;background:rgba(15,23,42,.97);border:1px solid rgba(148,163,184,.25);border-radius:22px;padding:24px;box-shadow:0 25px 60px rgba(0,0,0,.6)}
    .login-card h1{margin:0 0 6px;font-size:25px}
    .login-card p{margin:0 0 20px;color:#94a3b8;font-size:14px}
    .form-group{margin-bottom:13px}
    label{display:block;margin-bottom:7px;color:#cbd5e1;font-size:13px;font-weight:bold}
    .login-card input{width:100%;padding:13px;border-radius:12px;background:#1e293b;font-size:15px}
    input::placeholder{color:#94a3b8}
    .login-btn{width:100%;margin-top:5px;padding:13px;border-radius:12px;background:#22c55e;color:#fff}
    .login-btn:hover,.send-btn:hover,.add-group-btn:hover,.small-green:hover{background:#16a34a}
    .error-text{color:#f87171;font-size:13px;margin-top:12px;min-height:18px}
    .app{display:none;width:100%;height:100vh;overflow:hidden;background:#020617}
    .sidebar{width:320px;min-width:320px;height:100vh;background:#0f172a;border-right:1px solid rgba(148,163,184,.2);display:flex;flex-direction:column}
    .profile{padding:18px;border-bottom:1px solid rgba(148,163,184,.18);background:rgba(2,6,23,.65)}
    .profile-name{font-size:17px;font-weight:bold;margin-bottom:4px}
    .profile-role{display:inline-block;font-size:12px;padding:5px 9px;border-radius:999px;color:#86efac;border:1px solid rgba(34,197,94,.35);background:rgba(34,197,94,.12)}
    .logout-btn{margin-top:13px;background:#334155;color:#fff;padding:9px 12px;border-radius:10px;width:100%}
    .logout-btn:hover{background:#475569}
    .tabs{display:flex;gap:8px;padding:14px 14px 8px}
    .tab-btn{flex:1;padding:10px;border-radius:12px;background:#1e293b;color:#cbd5e1}
    .tab-btn.active{background:#22c55e;color:#fff}
    .search-box{padding:0 14px 14px;border-bottom:1px solid rgba(148,163,184,.18)}
    .search-input{width:100%;padding:11px 12px;border-radius:12px;background:#1e293b;font-size:14px}
    .sidebar-content{flex:1;overflow-y:auto;padding:14px}
    .section-title{font-size:12px;color:#94a3b8;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
    .user-item,.group-item{padding:12px;border-radius:14px;background:#111827;border:1px solid rgba(148,163,184,.12);margin-bottom:10px;cursor:pointer;position:relative}
    .user-item:hover,.user-item.active,.group-item:hover,.group-item.active{background:#14532d;border-color:rgba(134,239,172,.35)}
    .item-name{font-weight:bold;font-size:14px;margin-bottom:4px;padding-right:34px}
    .item-meta{font-size:12px;color:#94a3b8;line-height:1.4}
    .user-status{display:inline-flex;align-items:center;gap:5px;margin-top:5px;font-size:11px;color:#94a3b8}
    .dot{width:8px;height:8px;border-radius:999px;background:#64748b;display:inline-block}
    .dot.online{background:#22c55e;box-shadow:0 0 8px rgba(34,197,94,.8)}
    .dot.offline{background:#64748b}
    .badge{position:absolute;right:10px;top:10px;min-width:22px;height:22px;border-radius:999px;background:#ef4444;color:#fff;font-size:12px;display:none;align-items:center;justify-content:center;padding:0 6px}
    .badge.show{display:flex}
    .add-group-box{display:none;padding:14px;border-top:1px solid rgba(148,163,184,.18);background:rgba(2,6,23,.45)}
    .add-group-box.show{display:block}
    .group-input{width:100%;padding:12px;border-radius:12px;background:#1e293b;margin-bottom:8px}
    .add-group-btn,.small-green{background:#22c55e;color:#fff}
    .add-group-btn{width:100%;padding:11px;border-radius:12px}
    .main{flex:1;height:100vh;display:flex;flex-direction:column;background:radial-gradient(circle at top left,rgba(34,197,94,.08),transparent 28%),radial-gradient(circle at bottom right,rgba(56,189,248,.08),transparent 28%),#0b1220}
    .chat-header{min-height:76px;padding:16px 20px;background:rgba(2,6,23,.92);border-bottom:1px solid rgba(148,163,184,.2);display:flex;justify-content:space-between;align-items:center;gap:12px}
    .chat-title{font-size:21px;font-weight:bold;margin-bottom:4px}
    .chat-subtitle{color:#94a3b8;font-size:13px}
    .status{font-size:12px;padding:7px 10px;border-radius:999px;background:#1e293b;color:#cbd5e1;white-space:nowrap}
    .status.online{background:rgba(34,197,94,.15);color:#86efac;border:1px solid rgba(34,197,94,.35)}
    .messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
    .message{background:#1e293b;padding:10px 12px;border-radius:16px;max-width:74%;word-wrap:break-word;border:1px solid rgba(148,163,184,.12);align-self:flex-start;position:relative}
    .message.me{align-self:flex-end;background:#14532d;border-color:rgba(134,239,172,.25)}
    .msg-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .user{font-weight:bold;color:#38bdf8;margin-bottom:6px;font-size:14px}
    .message.me .user{color:#86efac}
    .msg-actions{display:flex;gap:6px;opacity:.9;background:rgba(15,23,42,.78);border:1px solid rgba(148,163,184,.14);border-radius:13px;padding:4px}
    .mini-btn{width:27px;height:27px;display:inline-flex;align-items:center;justify-content:center;background:transparent;color:#cbd5e1;border:none;border-radius:9px;padding:0;font-size:14px;line-height:1}
    .mini-btn:hover{background:#334155;color:#fff;transform:none}
    .mini-btn.delete:hover{background:rgba(239,68,68,.22);color:#fecaca}
    .mini-btn svg{width:15px;height:15px;stroke:currentColor}
    .text{font-size:15px;line-height:1.45;white-space:pre-wrap}
    .time{margin-top:7px;font-size:11px;color:#94a3b8;text-align:right}
    .reply-box{border-left:3px solid #22c55e;background:rgba(15,23,42,.55);padding:7px 9px;border-radius:9px;margin-bottom:8px;color:#cbd5e1;font-size:12px}
    .reply-name{color:#86efac;font-weight:bold;margin-bottom:3px}
    .file-card{margin-top:8px;background:rgba(15,23,42,.55);border:1px solid rgba(148,163,184,.18);border-radius:12px;padding:8px}
    .file-card img{max-width:260px;max-height:220px;border-radius:10px;display:block;margin-bottom:6px}
    .file-card a{color:#93c5fd;text-decoration:none;font-size:13px;font-weight:bold}
    .composer-extra{background:#0f172a;border-top:1px solid rgba(148,163,184,.16);padding:0 15px}
    .reply-preview,.file-preview,.edit-preview{display:none;margin-top:10px;background:#111827;border:1px solid rgba(148,163,184,.16);border-radius:12px;padding:10px;color:#cbd5e1;font-size:13px;justify-content:space-between;gap:10px;align-items:center}
    .reply-preview.show,.file-preview.show,.edit-preview.show{display:flex}
    .preview-title{font-weight:bold;color:#86efac;margin-bottom:3px}
    .close-preview{background:#334155;color:#fff;border-radius:8px;padding:6px 9px}
    .chat-form{display:flex;gap:10px;padding:15px;border-top:1px solid rgba(148,163,184,.2);background:#0f172a}
    .chat-input{flex:1;padding:13px;border-radius:12px;background:#1e293b;font-size:15px}
    .send-btn,.attach-btn{padding:13px 16px;border-radius:12px;color:#fff}
    .send-btn{background:#22c55e}
    .attach-btn{background:#334155}
    .attach-btn:hover{background:#475569}
    .empty,.error{color:#94a3b8;text-align:center;margin-top:20px}
    .error{color:#f87171}
    .mobile-toggle{display:none;background:#1e293b;color:#fff;padding:9px 11px;border-radius:10px;margin-right:8px}
    @media(max-width:760px){
      .sidebar{position:fixed;z-index:10;left:-330px;top:0;transition:.25s;box-shadow:20px 0 50px rgba(0,0,0,.45)}
      .sidebar.open{left:0}
      .mobile-toggle{display:inline-block}
      .message{max-width:92%}
      .chat-header{padding:12px}
      .chat-title{font-size:18px}
      .messages{padding:12px}
      .chat-form{gap:7px;padding:10px}
      .send-btn,.attach-btn{padding:12px}
      .file-card img{max-width:210px}
    }
  </style>
</head>

<body>
  <div class="login-page" id="loginPage">
    <div class="login-card">
      <h1>Login Forum Chat</h1>
      <p>Masuk menggunakan username dan password yang terdaftar.</p>
      <form id="loginForm">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="loginUsername" placeholder="Contoh: danu" autocomplete="username" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Masukkan password" autocomplete="current-password" />
        </div>
        <button class="login-btn" type="submit">Masuk</button>
        <div class="error-text" id="loginError"></div>
      </form>
    </div>
  </div>

  <div class="app" id="app">
    <aside class="sidebar" id="sidebar">
      <div class="profile">
        <div class="profile-name" id="profileName">User</div>
        <div class="profile-role" id="profileRole">Member</div>
        <button class="logout-btn" type="button" onclick="logout()">Logout</button>
      </div>

      <div class="tabs">
        <button class="tab-btn active" id="usersTabBtn" onclick="switchTab('users')">User</button>
        <button class="tab-btn" id="groupsTabBtn" onclick="switchTab('groups')">Grup</button>
      </div>

      <div class="search-box">
        <input class="search-input" type="text" id="searchInput" placeholder="Cari nama user..." oninput="handleSearch()" />
      </div>

      <div class="sidebar-content">
        <div id="usersPanel">
          <div class="section-title">Chat Pribadi</div>
          <div id="usersList"></div>
        </div>
        <div id="groupsPanel" style="display:none;">
          <div class="section-title">Room Grup</div>
          <div id="groupsList"></div>
        </div>
      </div>

      <div class="add-group-box" id="addGroupBox">
        <input class="group-input" type="text" id="newGroupName" placeholder="Nama grup baru..." />
        <button class="add-group-btn" type="button" onclick="createGroup()">Tambah Grup</button>
      </div>
    </aside>

    <main class="main">
      <div class="chat-header">
        <div>
          <button class="mobile-toggle" type="button" onclick="toggleSidebar()">☰</button>
          <span class="chat-title" id="chatTitle">Pilih Chat</span>
          <div class="chat-subtitle" id="chatSubtitle">Pilih user untuk chat pribadi atau pilih grup.</div>
        </div>
        <div class="status" id="statusText">Menghubungkan...</div>
      </div>

      <div class="messages" id="messages"><p class="empty">Pilih chat dulu.</p></div>

      <div class="composer-extra">
        <div class="reply-preview" id="replyPreview">
          <div><div class="preview-title">Reply pesan</div><div id="replyPreviewText"></div></div>
          <button class="close-preview" onclick="cancelReply()">Batal</button>
        </div>
        <div class="edit-preview" id="editPreview">
          <div><div class="preview-title">Mode edit pesan</div><div id="editPreviewText"></div></div>
          <button class="close-preview" onclick="cancelEdit()">Batal</button>
        </div>
        <div class="file-preview" id="filePreview">
          <div><div class="preview-title">File dipilih</div><div id="filePreviewText"></div></div>
          <button class="close-preview" onclick="clearFile()">Hapus</button>
        </div>
      </div>

      <form class="chat-form" id="chatForm">
        <input type="file" id="fileInput" style="display:none" onchange="handleFilePick()" />
        <button class="attach-btn" type="button" onclick="document.getElementById('fileInput').click()">📎</button>
        <input class="chat-input" type="text" id="messageInput" placeholder="Tulis pesan..." autocomplete="off" />
        <button class="send-btn" type="submit">Kirim</button>
      </form>
    </main>
  </div>

  <script>
    const SUPABASE_URL = "https://wbzxsvhlhbzusyzbjamp.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_55Jwsh0iRWj-BUAvds_MOQ_NEkwcU0p";
    const BUCKET_NAME = "chat-files";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const loginPage = document.getElementById("loginPage"), app = document.getElementById("app");
    const loginForm = document.getElementById("loginForm"), loginUsername = document.getElementById("loginUsername"), loginPassword = document.getElementById("loginPassword"), loginError = document.getElementById("loginError");
    const profileName = document.getElementById("profileName"), profileRole = document.getElementById("profileRole");
    const usersTabBtn = document.getElementById("usersTabBtn"), groupsTabBtn = document.getElementById("groupsTabBtn"), usersPanel = document.getElementById("usersPanel"), groupsPanel = document.getElementById("groupsPanel");
    const usersList = document.getElementById("usersList"), groupsList = document.getElementById("groupsList"), addGroupBox = document.getElementById("addGroupBox"), newGroupName = document.getElementById("newGroupName"), searchInput = document.getElementById("searchInput");
    const chatTitle = document.getElementById("chatTitle"), chatSubtitle = document.getElementById("chatSubtitle"), messagesDiv = document.getElementById("messages"), chatForm = document.getElementById("chatForm"), messageInput = document.getElementById("messageInput"), statusText = document.getElementById("statusText"), sidebar = document.getElementById("sidebar");
    const fileInput = document.getElementById("fileInput"), filePreview = document.getElementById("filePreview"), filePreviewText = document.getElementById("filePreviewText");
    const replyPreview = document.getElementById("replyPreview"), replyPreviewText = document.getElementById("replyPreviewText");
    const editPreview = document.getElementById("editPreview"), editPreviewText = document.getElementById("editPreviewText");

    let currentUser=null,currentTargetUser=null,currentGroup=null,currentMode="private",activeTab="users";
    let allUsers=[],visibleUsers=[],allGroups=[],realtimeStarted=false;
    let unreadPrivate={}, unreadGroups={};
    let selectedFile=null, replyTo=null, editingMessage=null;

    const savedUser = localStorage.getItem("forum_user_pro");
    if(savedUser){ currentUser=JSON.parse(savedUser); openApp(); }

    function escapeHtml(text){const div=document.createElement("div");div.textContent=text||"";return div.innerHTML}
    function shortText(text,max=80){text=String(text||"");return text.length>max?text.slice(0,max)+"...":text}
    function formatTime(dateString){const date=new Date(dateString);return date.toLocaleString("id-ID",{hour:"2-digit",minute:"2-digit",day:"2-digit",month:"short"})}
    function canManageGroups(){const role=String(currentUser?.role||"").toLowerCase();return role==="admin"||role==="leader"}
    function makeConversationKey(a,b){const ids=[Number(a),Number(b)].sort((x,y)=>x-y);return ids[0]+"_"+ids[1]}
    function isImage(type,name){return String(type||"").startsWith("image/") || /\.(png|jpe?g|gif|webp|bmp|svg)$/i.test(String(name||""))}

    function displayReplyName(name){
      if(!name)return "Pesan";
      if(currentUser && String(name).toLowerCase() === String(currentUser.display_name || "").toLowerCase()){
        return "ANDA";
      }
      return name;
    }

    function iconReply(){
      return `<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M10 8L6 12l4 4"/><path d="M6 12h9a4 4 0 0 1 4 4v1"/></svg>`;
    }

    function iconEdit(){
      return `<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>`;
    }

    function iconDelete(){
      return `<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M6 6l1 15h10l1-15"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>`;
    }

    function isUserOnline(user){
      if(!user)return false;
      if(user.is_online === true)return true;
      if(!user.last_seen)return false;
      const diff = Date.now() - new Date(user.last_seen).getTime();
      return diff < 45000;
    }

    function onlineStatusHtml(user){
      const online = isUserOnline(user);
      return `<div class="user-status"><span class="dot ${online ? "online" : "offline"}"></span>${online ? "Online" : "Offline"}</div>`;
    }

    async function setMyOnlineStatus(isOnline){
      if(!currentUser || !currentUser.id)return;
      await supabaseClient
        .from("users")
        .update({
          is_online: isOnline,
          last_seen: new Date().toISOString()
        })
        .eq("id", currentUser.id);
    }

    let heartbeatTimer = null;

    function startHeartbeat(){
      if(heartbeatTimer) clearInterval(heartbeatTimer);
      setMyOnlineStatus(true);
      heartbeatTimer = setInterval(function(){
        setMyOnlineStatus(true);
      }, 30000);
    }

    loginForm.addEventListener("submit",async e=>{
      e.preventDefault(); loginError.textContent="";
      const username=loginUsername.value.trim(), password=loginPassword.value.trim();
      if(!username||!password){loginError.textContent="Username dan password wajib diisi.";return}
      const {data,error}=await supabaseClient.from("users").select("id,username,password,display_name,role,is_online,last_seen").eq("username",username).eq("password",password).maybeSingle();
      if(error){loginError.textContent="Gagal login: "+error.message;return}
      if(!data){loginError.textContent="Username atau password salah.";return}
      currentUser=data; localStorage.setItem("forum_user_pro",JSON.stringify(currentUser)); openApp();
    });

    async function openApp(){
      loginPage.style.display="none"; app.style.display="flex";
      profileName.textContent=currentUser.display_name; profileRole.textContent=currentUser.role;
      startHeartbeat();
      addGroupBox.classList.toggle("show",canManageGroups());
      await loadUsers(); await loadGroups(); startRealtime(); switchTab("users");
    }

    async function logout(){
      await setMyOnlineStatus(false);
      localStorage.removeItem("forum_user_pro");
      location.reload();
    }

    window.addEventListener("beforeunload", function(){
      if(currentUser && navigator.sendBeacon){
        const url = SUPABASE_URL + "/rest/v1/users?id=eq." + currentUser.id;
        const body = JSON.stringify({
          is_online: false,
          last_seen: new Date().toISOString()
        });
        navigator.sendBeacon(url, new Blob([body], {type: "application/json"}));
      }
    });

    document.addEventListener("visibilitychange", function(){
      if(!currentUser)return;
      if(document.visibilityState === "visible"){
        setMyOnlineStatus(true);
      }else{
        setMyOnlineStatus(false);
      }
    });
    function toggleSidebar(){sidebar.classList.toggle("open")}

    function switchTab(tab){
      activeTab=tab; searchInput.value="";
      if(tab==="users"){
        usersPanel.style.display="block"; groupsPanel.style.display="none";
        usersTabBtn.classList.add("active"); groupsTabBtn.classList.remove("active");
        searchInput.placeholder="Cari nama user..."; addGroupBox.classList.remove("show"); renderUsers();
      }else{
        usersPanel.style.display="none"; groupsPanel.style.display="block";
        usersTabBtn.classList.remove("active"); groupsTabBtn.classList.add("active");
        searchInput.placeholder="Cari nama grup..."; addGroupBox.classList.toggle("show",canManageGroups()); renderGroups();
      }
    }

    function handleSearch(){activeTab==="users"?renderUsers():renderGroups()}

    async function loadUsers(){
      const {data,error}=await supabaseClient.from("users").select("id,username,display_name,role,is_online,last_seen").neq("id",currentUser.id).order("display_name",{ascending:true});
      if(error){usersList.innerHTML=`<p class="error">Gagal memuat user: ${escapeHtml(error.message)}</p>`;return}
      allUsers=data||[]; await loadVisibleUsersByConversation(); renderUsers();
    }

    async function loadVisibleUsersByConversation(){
      const role=String(currentUser.role||"").toLowerCase();
      if(role==="admin"||role==="leader"){visibleUsers=allUsers;return}
      const {data,error}=await supabaseClient.from("private_messages").select("sender_id,receiver_id").or("sender_id.eq."+currentUser.id+",receiver_id.eq."+currentUser.id);
      if(error){visibleUsers=[];return}
      const userIds=new Set();
      (data||[]).forEach(msg=>userIds.add(msg.sender_id===currentUser.id?msg.receiver_id:msg.sender_id));
      visibleUsers=allUsers.filter(user=>userIds.has(user.id));
    }

    function renderUsers(){
      const keyword=searchInput.value.trim().toLowerCase();
      const filtered=visibleUsers.filter(u=>(u.display_name+" "+u.username+" "+u.role).toLowerCase().includes(keyword));
      usersList.innerHTML="";
      if(!filtered.length){usersList.innerHTML=`<p class="empty">${keyword?"User tidak ditemukan.":"Belum ada percakapan pribadi."}</p>`;return}
      filtered.forEach(user=>{
        const div=document.createElement("div"); div.className="user-item";
        if(currentTargetUser&&currentTargetUser.id===user.id&&currentMode==="private") div.classList.add("active");
        div.onclick=()=>selectUser(user.id);
        const count=unreadPrivate[user.id]||0;
        div.innerHTML=`<div class="item-name">${escapeHtml(user.display_name)}</div><div class="item-meta">@${escapeHtml(user.username)} • ${escapeHtml(user.role)}</div>${onlineStatusHtml(user)}<div class="badge ${count>0?"show":""}">${count}</div>`;
        usersList.appendChild(div);
      });
    }

    async function loadGroups(){
      const {data,error}=await supabaseClient.from("groups").select("*").order("created_at",{ascending:true});
      if(error){groupsList.innerHTML=`<p class="error">Gagal memuat grup: ${escapeHtml(error.message)}</p>`;return}
      allGroups=data||[]; renderGroups();
    }

    function renderGroups(){
      const keyword=searchInput.value.trim().toLowerCase();
      const filtered=allGroups.filter(g=>String(g.name||"").toLowerCase().includes(keyword));
      groupsList.innerHTML="";
      if(!filtered.length){groupsList.innerHTML=`<p class="empty">Grup tidak ditemukan.</p>`;return}
      filtered.forEach(group=>{
        const div=document.createElement("div"); div.className="group-item";
        if(currentGroup&&currentGroup.id===group.id&&currentMode==="group") div.classList.add("active");
        div.onclick=()=>selectGroup(group.id);
        const count=unreadGroups[group.id]||0;
        div.innerHTML=`<div class="item-name"># ${escapeHtml(group.name)}</div><div class="item-meta">Room chat grup</div><div class="badge ${count>0?"show":""}">${count}</div>`;
        groupsList.appendChild(div);
      });
    }

    async function createGroup(){
      if(!canManageGroups()){alert("Hanya Admin atau Leader yang bisa menambahkan grup.");return}
      const name=newGroupName.value.trim(); if(!name){alert("Nama grup tidak boleh kosong.");return}
      const {data,error}=await supabaseClient.from("groups").insert([{name,created_by:currentUser.id}]).select().single();
      if(error){alert("Gagal menambah grup: "+error.message);return}
      newGroupName.value=""; allGroups.push(data); renderGroups(); selectGroup(data.id);
    }

    async function selectUser(userId){
      currentTargetUser=allUsers.find(u=>u.id===userId); if(!currentTargetUser)return;
      currentMode="private"; currentGroup=null; unreadPrivate[userId]=0; cancelReply(); cancelEdit(); clearFile(false);
      chatTitle.textContent=currentTargetUser.display_name; chatSubtitle.textContent="Chat pribadi dengan @"+currentTargetUser.username;
      renderUsers(); sidebar.classList.remove("open"); await loadPrivateMessages();
    }

    async function selectGroup(groupId){
      currentGroup=allGroups.find(g=>g.id===groupId); if(!currentGroup)return;
      currentMode="group"; currentTargetUser=null; unreadGroups[groupId]=0; cancelReply(); cancelEdit(); clearFile(false);
      chatTitle.textContent="# "+currentGroup.name; chatSubtitle.textContent="Room chat grup: "+currentGroup.name;
      renderGroups(); sidebar.classList.remove("open"); await loadGroupMessages();
    }

    async function loadPrivateMessages(){
      if(!currentTargetUser){messagesDiv.innerHTML=`<p class="empty">Pilih user dulu.</p>`;return}
      const key=makeConversationKey(currentUser.id,currentTargetUser.id);
      const {data,error}=await supabaseClient.from("private_messages").select("*").eq("conversation_key",key).order("created_at",{ascending:true}).limit(250);
      renderMessageList(data,error,"Belum ada pesan pribadi.");
    }

    async function loadGroupMessages(){
      if(!currentGroup){messagesDiv.innerHTML=`<p class="empty">Pilih grup dulu.</p>`;return}
      const {data,error}=await supabaseClient.from("messages").select("*").eq("group_id",currentGroup.id).order("created_at",{ascending:true}).limit(250);
      renderMessageList(data,error,"Belum ada pesan di grup ini.");
    }

    function renderMessageList(data,error,emptyText){
      if(error){messagesDiv.innerHTML=`<p class="error">Gagal memuat pesan: ${escapeHtml(error.message)}</p>`;return}
      messagesDiv.innerHTML="";
      if(!data||!data.length){messagesDiv.innerHTML=`<p class="empty">${emptyText}</p>`;return}
      data.forEach(renderMessage);
      messagesDiv.scrollTop=messagesDiv.scrollHeight;
    }

    function renderMessage(data){
      const existing=document.querySelector(`[data-msg-id="${currentMode}-${data.id}"]`);
      if(existing) existing.remove();

      const div=document.createElement("div"); div.className="message"; div.dataset.msgId=currentMode+"-"+data.id;
      if(currentUser&&data.username===currentUser.username) div.classList.add("me");

      const deleted=data.is_deleted===true;
      const canEdit=currentUser&&data.username===currentUser.username&&!deleted;
      const replyHtml=data.reply_to_text?`<div class="reply-box"><div class="reply-name">${escapeHtml(displayReplyName(data.reply_to_display_name||"Pesan"))}</div><div>${escapeHtml(shortText(data.reply_to_text,90))}</div></div>`:"";
      const fileHtml=(!deleted&&data.file_url)?renderFileHtml(data):"";
      const edited=data.edited_at&&!deleted?" • diedit":"";

      div.innerHTML=`
        <div class="msg-top">
          <div class="user">${escapeHtml(data.display_name||data.username)}</div>
          <div class="msg-actions">
            ${!deleted?`<button class="mini-btn" title="Reply" onclick='setReply(${JSON.stringify(packMsg(data))})'>${iconReply()}</button>`:""}
            ${canEdit?`<button class="mini-btn" title="Edit" onclick='setEdit(${JSON.stringify(packMsg(data))})'>${iconEdit()}</button><button class="mini-btn delete" title="Hapus" onclick='deleteMessage(${JSON.stringify(packMsg(data))})'>${iconDelete()}</button>`:""}
          </div>
        </div>
        ${replyHtml}
        <div class="text">${deleted?"<i>Pesan telah dihapus</i>":escapeHtml(data.message||"")}</div>
        ${fileHtml}
        <div class="time">${formatTime(data.created_at)}${edited}</div>
      `;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop=messagesDiv.scrollHeight;
    }

    function packMsg(data){
      return {
        id:data.id,
        mode:currentMode,
        message:data.message||"",
        display_name:data.display_name||data.username||"",
        file_url:data.file_url||"",
        file_name:data.file_name||"",
        file_type:data.file_type||""
      };
    }

    function renderFileHtml(data){
      const url=escapeHtml(data.file_url), name=escapeHtml(data.file_name||"File");
      if(isImage(data.file_type,data.file_name)){
        return `<div class="file-card"><img src="${url}" alt="${name}"><a href="${url}" target="_blank">Buka gambar</a></div>`;
      }
      return `<div class="file-card">📎 <a href="${url}" target="_blank">${name}</a></div>`;
    }

    function setReply(msg){
      replyTo=msg; cancelEdit();
      replyPreviewText.textContent=displayReplyName(msg.display_name||"User")+": "+shortText(msg.message || msg.file_name || "File",90);
      replyPreview.classList.add("show");
      messageInput.focus();
    }

    function cancelReply(){replyTo=null; replyPreview.classList.remove("show"); replyPreviewText.textContent=""}

    function setEdit(msg){
      if(!msg.message && msg.file_url){alert("Pesan file tanpa teks tidak bisa diedit teksnya.");return}
      editingMessage=msg; cancelReply();
      editPreviewText.textContent="Mengedit: "+shortText(msg.message,90);
      editPreview.classList.add("show");
      messageInput.value=msg.message||"";
      messageInput.focus();
    }

    function cancelEdit(){editingMessage=null; editPreview.classList.remove("show"); editPreviewText.textContent=""; messageInput.value=""}

    function handleFilePick(){
      selectedFile=fileInput.files[0]||null;
      if(selectedFile){
        filePreviewText.textContent=selectedFile.name+" ("+Math.ceil(selectedFile.size/1024)+" KB)";
        filePreview.classList.add("show");
      }else clearFile(false);
    }

    function clearFile(clearInput=true){
      selectedFile=null; filePreview.classList.remove("show"); filePreviewText.textContent="";
      if(clearInput) fileInput.value="";
    }

    async function uploadFile(){
      if(!selectedFile)return {url:null,name:null,type:null};
      const safeName=selectedFile.name.replace(/[^a-zA-Z0-9._-]/g,"_");
      const path=`${currentUser.id}/${Date.now()}_${safeName}`;
      const {error}=await supabaseClient.storage.from(BUCKET_NAME).upload(path,selectedFile,{cacheControl:"3600",upsert:false});
      if(error) throw error;
      const {data}=supabaseClient.storage.from(BUCKET_NAME).getPublicUrl(path);
      return {url:data.publicUrl,name:selectedFile.name,type:selectedFile.type||"application/octet-stream"};
    }

    chatForm.addEventListener("submit",async e=>{
      e.preventDefault();
      if(!currentUser){alert("Silakan login dulu.");return}

      const message=messageInput.value.trim();

      if(editingMessage){
        if(!message){alert("Pesan tidak boleh kosong.");return}
        await updateMessageText(message);
        return;
      }

      if(!message&&!selectedFile)return;

      if(currentMode==="group") await sendGroupMessage(message);
      else await sendPrivateMessage(message);
    });

    async function updateMessageText(message){
      const table=editingMessage.mode==="group"?"messages":"private_messages";
      const {error}=await supabaseClient.from(table).update({message,edited_at:new Date().toISOString()}).eq("id",editingMessage.id);
      if(error){alert("Gagal edit pesan: "+error.message);return}
      cancelEdit();
      if(currentMode==="group") await loadGroupMessages(); else await loadPrivateMessages();
    }

    async function deleteMessage(msg){
      if(!confirm("Hapus pesan ini?"))return;
      const table=msg.mode==="group"?"messages":"private_messages";
      const {error}=await supabaseClient.from(table).update({is_deleted:true,message:"",file_url:null,file_name:null,file_type:null,edited_at:new Date().toISOString()}).eq("id",msg.id);
      if(error){alert("Gagal hapus pesan: "+error.message);return}
      if(currentMode==="group") await loadGroupMessages(); else await loadPrivateMessages();
    }

    function replyPayload(){
      if(!replyTo)return {};
      return {
        reply_to_id: replyTo.id,
        reply_to_text: replyTo.message || replyTo.file_name || "File",
        reply_to_display_name: replyTo.display_name || "User"
      };
    }

    async function sendGroupMessage(message){
      if(!currentGroup){alert("Pilih grup dulu.");return}
      try{
        const file=await uploadFile();
        messageInput.value="";
        const {error}=await supabaseClient.from("messages").insert([{
          group_id:currentGroup.id,user_id:currentUser.id,username:currentUser.username,display_name:currentUser.display_name,message,
          file_url:file.url,file_name:file.name,file_type:file.type,...replyPayload()
        }]);
        if(error)throw error;
        cancelReply(); clearFile();
      }catch(err){alert("Gagal mengirim pesan grup: "+err.message)}
    }

    async function sendPrivateMessage(message){
      if(!currentTargetUser){alert("Pilih user dulu.");return}
      try{
        const file=await uploadFile();
        const key=makeConversationKey(currentUser.id,currentTargetUser.id);
        messageInput.value="";
        const {error}=await supabaseClient.from("private_messages").insert([{
          conversation_key:key,sender_id:currentUser.id,receiver_id:currentTargetUser.id,username:currentUser.username,display_name:currentUser.display_name,message,
          file_url:file.url,file_name:file.name,file_type:file.type,...replyPayload()
        }]);
        if(error)throw error;
        cancelReply(); clearFile();
        if(!visibleUsers.some(u=>u.id===currentTargetUser.id)){visibleUsers.push(currentTargetUser);renderUsers()}
      }catch(err){alert("Gagal mengirim pesan pribadi: "+err.message)}
    }

    function startRealtime(){
      if(realtimeStarted)return; realtimeStarted=true;
      supabaseClient.channel("forum-pro-realtime")
        .on("postgres_changes",{event:"INSERT",schema:"public",table:"messages"},payload=>{
          const msg=payload.new;
          if(currentMode==="group"&&currentGroup&&msg.group_id===currentGroup.id){
            const empty=messagesDiv.querySelector(".empty"); if(empty)messagesDiv.innerHTML="";
            renderMessage(msg);
          }else if(msg.username!==currentUser.username){
            unreadGroups[msg.group_id]=(unreadGroups[msg.group_id]||0)+1; renderGroups();
          }
        })
        .on("postgres_changes",{event:"UPDATE",schema:"public",table:"messages"},payload=>{
          if(currentMode==="group"&&currentGroup&&payload.new.group_id===currentGroup.id) loadGroupMessages();
        })
        .on("postgres_changes",{event:"INSERT",schema:"public",table:"private_messages"},payload=>{
          const msg=payload.new;
          if(msg.sender_id!==currentUser.id&&msg.receiver_id!==currentUser.id)return;
          const otherId=msg.sender_id===currentUser.id?msg.receiver_id:msg.sender_id;
          const otherUser=allUsers.find(u=>u.id===otherId);
          if(otherUser&&!visibleUsers.some(u=>u.id===otherUser.id)){visibleUsers.push(otherUser)}
          if(currentMode==="private"&&currentTargetUser&&msg.conversation_key===makeConversationKey(currentUser.id,currentTargetUser.id)){
            const empty=messagesDiv.querySelector(".empty"); if(empty)messagesDiv.innerHTML="";
            renderMessage(msg);
          }else if(msg.sender_id!==currentUser.id){
            unreadPrivate[otherId]=(unreadPrivate[otherId]||0)+1;
          }
          renderUsers();
        })
        .on("postgres_changes",{event:"UPDATE",schema:"public",table:"private_messages"},payload=>{
          const msg=payload.new;
          if(currentMode==="private"&&currentTargetUser&&msg.conversation_key===makeConversationKey(currentUser.id,currentTargetUser.id)) loadPrivateMessages();
        })
        .on("postgres_changes",{event:"INSERT",schema:"public",table:"groups"},payload=>{
          if(!allGroups.some(g=>g.id===payload.new.id)){allGroups.push(payload.new);renderGroups()}
        })
        .on("postgres_changes",{event:"UPDATE",schema:"public",table:"users"},payload=>{
          const updated = payload.new;
          allUsers = allUsers.map(function(user){
            return user.id === updated.id ? {...user, is_online: updated.is_online, last_seen: updated.last_seen} : user;
          });
          visibleUsers = visibleUsers.map(function(user){
            return user.id === updated.id ? {...user, is_online: updated.is_online, last_seen: updated.last_seen} : user;
          });
          renderUsers();
        })
        .subscribe(status=>{
          if(status==="SUBSCRIBED"){statusText.textContent="Online";statusText.classList.add("online")}
          else{statusText.textContent="Menghubungkan...";statusText.classList.remove("online")}
        });
    }
  </script>
</body>
</html>
