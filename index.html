<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forum Chat Private & Grup</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #020617;
      color: white;
    }

    button {
      border: none;
      cursor: pointer;
      transition: 0.2s;
      font-weight: bold;
    }

    button:hover {
      transform: translateY(-1px);
    }

    input {
      border: none;
      outline: none;
      color: white;
    }

    .login-page {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
      background:
        radial-gradient(circle at top left, rgba(34, 197, 94, 0.15), transparent 30%),
        radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.13), transparent 30%),
        #020617;
    }

    .login-card {
      width: 100%;
      max-width: 410px;
      background: rgba(15, 23, 42, 0.97);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 22px;
      padding: 24px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
    }

    .login-card h1 {
      margin: 0 0 6px;
      font-size: 25px;
    }

    .login-card p {
      margin: 0 0 20px;
      color: #94a3b8;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 13px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: #cbd5e1;
      font-size: 13px;
      font-weight: bold;
    }

    .login-card input {
      width: 100%;
      padding: 13px;
      border-radius: 12px;
      background: #1e293b;
      font-size: 15px;
    }

    .login-card input::placeholder,
    .chat-input::placeholder,
    .group-input::placeholder,
    .search-input::placeholder {
      color: #94a3b8;
    }

    .login-btn {
      width: 100%;
      margin-top: 5px;
      padding: 13px;
      border-radius: 12px;
      background: #22c55e;
      color: white;
    }

    .login-btn:hover {
      background: #16a34a;
    }

    .error-text {
      color: #f87171;
      font-size: 13px;
      margin-top: 12px;
      min-height: 18px;
    }

    .app {
      display: none;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: #020617;
    }

    .sidebar {
      width: 320px;
      min-width: 320px;
      height: 100vh;
      background: #0f172a;
      border-right: 1px solid rgba(148, 163, 184, 0.2);
      display: flex;
      flex-direction: column;
    }

    .profile {
      padding: 18px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.18);
      background: rgba(2, 6, 23, 0.65);
    }

    .profile-name {
      font-size: 17px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .profile-role {
      display: inline-block;
      font-size: 12px;
      padding: 5px 9px;
      border-radius: 999px;
      color: #86efac;
      border: 1px solid rgba(34, 197, 94, 0.35);
      background: rgba(34, 197, 94, 0.12);
    }

    .logout-btn {
      margin-top: 13px;
      background: #334155;
      color: white;
      padding: 9px 12px;
      border-radius: 10px;
      width: 100%;
    }

    .logout-btn:hover {
      background: #475569;
    }

    .tabs {
      display: flex;
      gap: 8px;
      padding: 14px 14px 8px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      border-radius: 12px;
      background: #1e293b;
      color: #cbd5e1;
    }

    .tab-btn.active {
      background: #22c55e;
      color: white;
    }

    .search-box {
      padding: 0 14px 14px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.18);
    }

    .search-input {
      width: 100%;
      padding: 11px 12px;
      border-radius: 12px;
      background: #1e293b;
      font-size: 14px;
    }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
    }

    .section-title {
      font-size: 12px;
      color: #94a3b8;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .user-item,
    .group-item {
      padding: 12px;
      border-radius: 14px;
      background: #111827;
      border: 1px solid rgba(148, 163, 184, 0.12);
      margin-bottom: 10px;
      cursor: pointer;
    }

    .user-item:hover,
    .user-item.active,
    .group-item:hover,
    .group-item.active {
      background: #14532d;
      border-color: rgba(134, 239, 172, 0.35);
    }

    .item-name {
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .item-meta {
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.4;
    }

    .add-group-box {
      display: none;
      padding: 14px;
      border-top: 1px solid rgba(148, 163, 184, 0.18);
      background: rgba(2, 6, 23, 0.45);
    }

    .add-group-box.show {
      display: block;
    }

    .group-input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      background: #1e293b;
      margin-bottom: 8px;
    }

    .add-group-btn {
      width: 100%;
      padding: 11px;
      border-radius: 12px;
      background: #22c55e;
      color: white;
    }

    .add-group-btn:hover {
      background: #16a34a;
    }

    .main {
      flex: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(circle at top left, rgba(34, 197, 94, 0.08), transparent 28%),
        radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.08), transparent 28%),
        #0b1220;
    }

    .chat-header {
      min-height: 76px;
      padding: 16px 20px;
      background: rgba(2, 6, 23, 0.92);
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .chat-title {
      font-size: 21px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .chat-subtitle {
      color: #94a3b8;
      font-size: 13px;
    }

    .status {
      font-size: 12px;
      padding: 7px 10px;
      border-radius: 999px;
      background: #1e293b;
      color: #cbd5e1;
      white-space: nowrap;
    }

    .status.online {
      background: rgba(34, 197, 94, 0.15);
      color: #86efac;
      border: 1px solid rgba(34, 197, 94, 0.35);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      background: #1e293b;
      padding: 12px 14px;
      border-radius: 16px;
      max-width: 72%;
      word-wrap: break-word;
      border: 1px solid rgba(148, 163, 184, 0.12);
      align-self: flex-start;
    }

    .message.me {
      align-self: flex-end;
      background: #14532d;
      border-color: rgba(134, 239, 172, 0.25);
    }

    .message .user {
      font-weight: bold;
      color: #38bdf8;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .message.me .user {
      color: #86efac;
    }

    .message .text {
      font-size: 15px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .message .time {
      margin-top: 7px;
      font-size: 11px;
      color: #94a3b8;
      text-align: right;
    }

    .chat-form {
      display: flex;
      gap: 10px;
      padding: 15px;
      border-top: 1px solid rgba(148, 163, 184, 0.2);
      background: #0f172a;
    }

    .chat-input {
      flex: 1;
      padding: 13px;
      border-radius: 12px;
      background: #1e293b;
      font-size: 15px;
    }

    .send-btn {
      padding: 13px 18px;
      border-radius: 12px;
      background: #22c55e;
      color: white;
    }

    .send-btn:hover {
      background: #16a34a;
    }

    .empty,
    .error {
      color: #94a3b8;
      text-align: center;
      margin-top: 20px;
    }

    .error {
      color: #f87171;
    }

    .mobile-toggle {
      display: none;
      background: #1e293b;
      color: white;
      padding: 9px 11px;
      border-radius: 10px;
      margin-right: 8px;
    }

    @media (max-width: 760px) {
      .app {
        position: relative;
      }

      .sidebar {
        position: fixed;
        z-index: 10;
        left: -330px;
        top: 0;
        transition: 0.25s;
        box-shadow: 20px 0 50px rgba(0, 0, 0, 0.45);
      }

      .sidebar.open {
        left: 0;
      }

      .mobile-toggle {
        display: inline-block;
      }

      .message {
        max-width: 92%;
      }

      .chat-header {
        padding: 12px;
      }

      .chat-title {
        font-size: 18px;
      }

      .messages {
        padding: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="login-page" id="loginPage">
    <div class="login-card">
      <h1>Login Forum Chat</h1>
      <p>Masuk menggunakan username dan password yang terdaftar.</p>

      <form id="loginForm">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="loginUsername" placeholder="Contoh: danu" autocomplete="username" />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Masukkan password" autocomplete="current-password" />
        </div>

        <button class="login-btn" type="submit">Masuk</button>
        <div class="error-text" id="loginError"></div>
      </form>
    </div>
  </div>

  <div class="app" id="app">
    <aside class="sidebar" id="sidebar">
      <div class="profile">
        <div class="profile-name" id="profileName">User</div>
        <div class="profile-role" id="profileRole">Member</div>
        <button class="logout-btn" type="button" onclick="logout()">Logout</button>
      </div>

      <div class="tabs">
        <button class="tab-btn active" id="usersTabBtn" onclick="switchTab('users')">User</button>
        <button class="tab-btn" id="groupsTabBtn" onclick="switchTab('groups')">Grup</button>
      </div>

      <div class="search-box">
        <input class="search-input" type="text" id="searchInput" placeholder="Cari nama user..." oninput="handleSearch()" />
      </div>

      <div class="sidebar-content">
        <div id="usersPanel">
          <div class="section-title">Chat Pribadi</div>
          <div id="usersList"></div>
        </div>

        <div id="groupsPanel" style="display:none;">
          <div class="section-title">Room Grup</div>
          <div id="groupsList"></div>
        </div>
      </div>

      <div class="add-group-box" id="addGroupBox">
        <input class="group-input" type="text" id="newGroupName" placeholder="Nama grup baru..." />
        <button class="add-group-btn" type="button" onclick="createGroup()">Tambah Grup</button>
      </div>
    </aside>

    <main class="main">
      <div class="chat-header">
        <div>
          <button class="mobile-toggle" type="button" onclick="toggleSidebar()">☰</button>
          <span class="chat-title" id="chatTitle">Pilih Chat</span>
          <div class="chat-subtitle" id="chatSubtitle">Pilih user untuk chat pribadi atau pilih grup.</div>
        </div>

        <div class="status" id="statusText">Menghubungkan...</div>
      </div>

      <div class="messages" id="messages">
        <p class="empty">Pilih chat dulu.</p>
      </div>

      <form class="chat-form" id="chatForm">
        <input class="chat-input" type="text" id="messageInput" placeholder="Tulis pesan..." autocomplete="off" />
        <button class="send-btn" type="submit">Kirim</button>
      </form>
    </main>
  </div>

  <script>
    const SUPABASE_URL = "https://wbzxsvhlhbzusyzbjamp.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_55Jwsh0iRWj-BUAvds_MOQ_NEkwcU0p";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const loginPage = document.getElementById("loginPage");
    const app = document.getElementById("app");
    const loginForm = document.getElementById("loginForm");
    const loginUsername = document.getElementById("loginUsername");
    const loginPassword = document.getElementById("loginPassword");
    const loginError = document.getElementById("loginError");

    const profileName = document.getElementById("profileName");
    const profileRole = document.getElementById("profileRole");
    const usersTabBtn = document.getElementById("usersTabBtn");
    const groupsTabBtn = document.getElementById("groupsTabBtn");
    const usersPanel = document.getElementById("usersPanel");
    const groupsPanel = document.getElementById("groupsPanel");
    const usersList = document.getElementById("usersList");
    const groupsList = document.getElementById("groupsList");
    const addGroupBox = document.getElementById("addGroupBox");
    const newGroupName = document.getElementById("newGroupName");
    const searchInput = document.getElementById("searchInput");

    const chatTitle = document.getElementById("chatTitle");
    const chatSubtitle = document.getElementById("chatSubtitle");
    const messagesDiv = document.getElementById("messages");
    const chatForm = document.getElementById("chatForm");
    const messageInput = document.getElementById("messageInput");
    const statusText = document.getElementById("statusText");
    const sidebar = document.getElementById("sidebar");

    let currentUser = null;
    let currentTargetUser = null;
    let currentGroup = null;
    let currentMode = "private";
    let activeTab = "users";

    let allUsers = [];
    let visibleUsers = [];
    let allGroups = [];
    let realtimeStarted = false;

    const savedUser = localStorage.getItem("forum_user_v3");
    if (savedUser) {
      currentUser = JSON.parse(savedUser);
      openApp();
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text || "";
      return div.innerHTML;
    }

    function formatTime(dateString) {
      const date = new Date(dateString);
      return date.toLocaleString("id-ID", {
        hour: "2-digit",
        minute: "2-digit",
        day: "2-digit",
        month: "short"
      });
    }

    function canManageGroups() {
      if (!currentUser) return false;
      const role = String(currentUser.role || "").toLowerCase();
      return role === "admin" || role === "leader";
    }

    function makeConversationKey(userA, userB) {
      const ids = [Number(userA), Number(userB)].sort(function(a, b) {
        return a - b;
      });

      return ids[0] + "_" + ids[1];
    }

    loginForm.addEventListener("submit", async function(e) {
      e.preventDefault();

      loginError.textContent = "";

      const username = loginUsername.value.trim();
      const password = loginPassword.value.trim();

      if (!username || !password) {
        loginError.textContent = "Username dan password wajib diisi.";
        return;
      }

      const { data, error } = await supabaseClient
        .from("users")
        .select("id, username, password, display_name, role")
        .eq("username", username)
        .eq("password", password)
        .maybeSingle();

      if (error) {
        loginError.textContent = "Gagal login: " + error.message;
        return;
      }

      if (!data) {
        loginError.textContent = "Username atau password salah.";
        return;
      }

      currentUser = data;
      localStorage.setItem("forum_user_v3", JSON.stringify(currentUser));
      openApp();
    });

    async function openApp() {
      loginPage.style.display = "none";
      app.style.display = "flex";

      profileName.textContent = currentUser.display_name;
      profileRole.textContent = currentUser.role;

      addGroupBox.classList.toggle("show", canManageGroups());

      await loadUsers();
      await loadGroups();
      startRealtime();

      switchTab("users");
    }

    function logout() {
      localStorage.removeItem("forum_user_v3");
      currentUser = null;
      location.reload();
    }

    function toggleSidebar() {
      sidebar.classList.toggle("open");
    }

    function switchTab(tab) {
      activeTab = tab;
      searchInput.value = "";

      if (tab === "users") {
        usersPanel.style.display = "block";
        groupsPanel.style.display = "none";
        usersTabBtn.classList.add("active");
        groupsTabBtn.classList.remove("active");
        searchInput.placeholder = "Cari nama user...";
        addGroupBox.classList.remove("show");
        renderUsers();
      } else {
        usersPanel.style.display = "none";
        groupsPanel.style.display = "block";
        usersTabBtn.classList.remove("active");
        groupsTabBtn.classList.add("active");
        searchInput.placeholder = "Cari nama grup...";
        addGroupBox.classList.toggle("show", canManageGroups());
        renderGroups();
      }
    }

    function handleSearch() {
      if (activeTab === "users") {
        renderUsers();
      } else {
        renderGroups();
      }
    }

    async function loadUsers() {
      const { data, error } = await supabaseClient
        .from("users")
        .select("id, username, display_name, role")
        .neq("id", currentUser.id)
        .order("display_name", { ascending: true });

      if (error) {
        usersList.innerHTML = `<p class="error">Gagal memuat user: ${escapeHtml(error.message)}</p>`;
        return;
      }

      allUsers = data || [];
      await loadVisibleUsersByConversation();
      renderUsers();
    }

    async function loadVisibleUsersByConversation() {
      const role = String(currentUser.role || "").toLowerCase();

      if (role === "admin" || role === "leader") {
        visibleUsers = allUsers;
        return;
      }

      const { data, error } = await supabaseClient
        .from("private_messages")
        .select("sender_id, receiver_id")
        .or("sender_id.eq." + currentUser.id + ",receiver_id.eq." + currentUser.id);

      if (error) {
        visibleUsers = [];
        return;
      }

      const userIds = new Set();

      (data || []).forEach(function(msg) {
        const otherId = msg.sender_id === currentUser.id ? msg.receiver_id : msg.sender_id;
        userIds.add(otherId);
      });

      visibleUsers = allUsers.filter(function(user) {
        return userIds.has(user.id);
      });
    }

    function renderUsers() {
      const keyword = searchInput.value.trim().toLowerCase();

      const filtered = visibleUsers.filter(function(user) {
        const text = (user.display_name + " " + user.username + " " + user.role).toLowerCase();
        return text.includes(keyword);
      });

      usersList.innerHTML = "";

      if (filtered.length === 0) {
        if (keyword) {
          usersList.innerHTML = `<p class="empty">User tidak ditemukan.</p>`;
        } else {
          usersList.innerHTML = `<p class="empty">Belum ada percakapan pribadi.</p>`;
        }
        return;
      }

      filtered.forEach(function(user) {
        const div = document.createElement("div");
        div.className = "user-item";

        if (currentTargetUser && currentTargetUser.id === user.id && currentMode === "private") {
          div.classList.add("active");
        }

        div.onclick = function() {
          selectUser(user.id);
        };

        div.innerHTML = `
          <div class="item-name">${escapeHtml(user.display_name)}</div>
          <div class="item-meta">@${escapeHtml(user.username)} • ${escapeHtml(user.role)}</div>
        `;

        usersList.appendChild(div);
      });
    }

    async function loadGroups() {
      const { data, error } = await supabaseClient
        .from("groups")
        .select("*")
        .order("created_at", { ascending: true });

      if (error) {
        groupsList.innerHTML = `<p class="error">Gagal memuat grup: ${escapeHtml(error.message)}</p>`;
        return;
      }

      allGroups = data || [];
      renderGroups();
    }

    function renderGroups() {
      const keyword = searchInput.value.trim().toLowerCase();

      const filtered = allGroups.filter(function(group) {
        return String(group.name || "").toLowerCase().includes(keyword);
      });

      groupsList.innerHTML = "";

      if (filtered.length === 0) {
        groupsList.innerHTML = `<p class="empty">Grup tidak ditemukan.</p>`;
        return;
      }

      filtered.forEach(function(group) {
        const div = document.createElement("div");
        div.className = "group-item";

        if (currentGroup && currentGroup.id === group.id && currentMode === "group") {
          div.classList.add("active");
        }

        div.onclick = function() {
          selectGroup(group.id);
        };

        div.innerHTML = `
          <div class="item-name"># ${escapeHtml(group.name)}</div>
          <div class="item-meta">Room chat grup</div>
        `;

        groupsList.appendChild(div);
      });
    }

    async function createGroup() {
      if (!canManageGroups()) {
        alert("Hanya Admin atau Leader yang bisa menambahkan grup.");
        return;
      }

      const name = newGroupName.value.trim();

      if (!name) {
        alert("Nama grup tidak boleh kosong.");
        return;
      }

      const { data, error } = await supabaseClient
        .from("groups")
        .insert([
          {
            name: name,
            created_by: currentUser.id
          }
        ])
        .select()
        .single();

      if (error) {
        alert("Gagal menambah grup: " + error.message);
        return;
      }

      newGroupName.value = "";
      allGroups.push(data);
      renderGroups();
      selectGroup(data.id);
    }

    async function selectUser(userId) {
      currentTargetUser = allUsers.find(function(user) {
        return user.id === userId;
      });

      if (!currentTargetUser) return;

      currentMode = "private";
      currentGroup = null;

      chatTitle.textContent = currentTargetUser.display_name;
      chatSubtitle.textContent = "Chat pribadi dengan @" + currentTargetUser.username;

      renderUsers();
      sidebar.classList.remove("open");

      await loadPrivateMessages();
    }

    async function selectGroup(groupId) {
      currentGroup = allGroups.find(function(group) {
        return group.id === groupId;
      });

      if (!currentGroup) return;

      currentMode = "group";
      currentTargetUser = null;

      chatTitle.textContent = "# " + currentGroup.name;
      chatSubtitle.textContent = "Room chat grup: " + currentGroup.name;

      renderGroups();
      sidebar.classList.remove("open");

      await loadGroupMessages();
    }

    async function loadPrivateMessages() {
      if (!currentTargetUser) {
        messagesDiv.innerHTML = `<p class="empty">Pilih user dulu.</p>`;
        return;
      }

      const conversationKey = makeConversationKey(currentUser.id, currentTargetUser.id);

      const { data, error } = await supabaseClient
        .from("private_messages")
        .select("*")
        .eq("conversation_key", conversationKey)
        .order("created_at", { ascending: true })
        .limit(200);

      if (error) {
        messagesDiv.innerHTML = `<p class="error">Gagal memuat pesan: ${escapeHtml(error.message)}</p>`;
        return;
      }

      messagesDiv.innerHTML = "";

      if (!data || data.length === 0) {
        messagesDiv.innerHTML = `<p class="empty">Belum ada pesan pribadi.</p>`;
        return;
      }

      data.forEach(renderMessage);
    }

    async function loadGroupMessages() {
      if (!currentGroup) {
        messagesDiv.innerHTML = `<p class="empty">Pilih grup dulu.</p>`;
        return;
      }

      const { data, error } = await supabaseClient
        .from("messages")
        .select("*")
        .eq("group_id", currentGroup.id)
        .order("created_at", { ascending: true })
        .limit(200);

      if (error) {
        messagesDiv.innerHTML = `<p class="error">Gagal memuat pesan: ${escapeHtml(error.message)}</p>`;
        return;
      }

      messagesDiv.innerHTML = "";

      if (!data || data.length === 0) {
        messagesDiv.innerHTML = `<p class="empty">Belum ada pesan di grup ini.</p>`;
        return;
      }

      data.forEach(renderMessage);
    }

    function renderMessage(data) {
      const div = document.createElement("div");
      div.className = "message";

      if (currentUser && data.username === currentUser.username) {
        div.classList.add("me");
      }

      div.innerHTML = `
        <div class="user">${escapeHtml(data.display_name || data.username)}</div>
        <div class="text">${escapeHtml(data.message)}</div>
        <div class="time">${formatTime(data.created_at)}</div>
      `;

      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    chatForm.addEventListener("submit", async function(e) {
      e.preventDefault();

      if (!currentUser) {
        alert("Silakan login dulu.");
        return;
      }

      const message = messageInput.value.trim();
      if (!message) return;

      if (currentMode === "group") {
        await sendGroupMessage(message);
      } else {
        await sendPrivateMessage(message);
      }
    });

    async function sendGroupMessage(message) {
      if (!currentGroup) {
        alert("Pilih grup dulu.");
        return;
      }

      messageInput.value = "";

      const { error } = await supabaseClient
        .from("messages")
        .insert([
          {
            group_id: currentGroup.id,
            user_id: currentUser.id,
            username: currentUser.username,
            display_name: currentUser.display_name,
            message: message
          }
        ]);

      if (error) {
        alert("Gagal mengirim pesan grup: " + error.message);
      }
    }

    async function sendPrivateMessage(message) {
      if (!currentTargetUser) {
        alert("Pilih user dulu.");
        return;
      }

      messageInput.value = "";

      const conversationKey = makeConversationKey(currentUser.id, currentTargetUser.id);

      const { error } = await supabaseClient
        .from("private_messages")
        .insert([
          {
            conversation_key: conversationKey,
            sender_id: currentUser.id,
            receiver_id: currentTargetUser.id,
            username: currentUser.username,
            display_name: currentUser.display_name,
            message: message
          }
        ]);

      if (error) {
        alert("Gagal mengirim pesan pribadi: " + error.message);
      } else {
        if (!visibleUsers.some(function(user) { return user.id === currentTargetUser.id; })) {
          visibleUsers.push(currentTargetUser);
          renderUsers();
        }
      }
    }

    function startRealtime() {
      if (realtimeStarted) return;
      realtimeStarted = true;

      supabaseClient
        .channel("forum-realtime-v3")
        .on(
          "postgres_changes",
          {
            event: "INSERT",
            schema: "public",
            table: "messages"
          },
          function(payload) {
            if (currentMode !== "group") return;
            if (!currentGroup) return;
            if (payload.new.group_id !== currentGroup.id) return;

            const emptyText = messagesDiv.querySelector(".empty");
            if (emptyText) messagesDiv.innerHTML = "";

            renderMessage(payload.new);
          }
        )
        .on(
          "postgres_changes",
          {
            event: "INSERT",
            schema: "public",
            table: "private_messages"
          },
          async function(payload) {
            const msg = payload.new;

            if (msg.sender_id !== currentUser.id && msg.receiver_id !== currentUser.id) return;

            const otherId = msg.sender_id === currentUser.id ? msg.receiver_id : msg.sender_id;
            const otherUser = allUsers.find(function(user) {
              return user.id === otherId;
            });

            if (otherUser && !visibleUsers.some(function(user) { return user.id === otherUser.id; })) {
              visibleUsers.push(otherUser);
              renderUsers();
            }

            if (currentMode !== "private") return;
            if (!currentTargetUser) return;

            const currentKey = makeConversationKey(currentUser.id, currentTargetUser.id);
            if (msg.conversation_key !== currentKey) return;

            const emptyText = messagesDiv.querySelector(".empty");
            if (emptyText) messagesDiv.innerHTML = "";

            renderMessage(msg);
          }
        )
        .on(
          "postgres_changes",
          {
            event: "INSERT",
            schema: "public",
            table: "groups"
          },
          function(payload) {
            const exists = allGroups.some(function(group) {
              return group.id === payload.new.id;
            });

            if (!exists) {
              allGroups.push(payload.new);
              renderGroups();
            }
          }
        )
        .subscribe(function(status) {
          if (status === "SUBSCRIBED") {
            statusText.textContent = "Online";
            statusText.classList.add("online");
          } else {
            statusText.textContent = "Menghubungkan...";
            statusText.classList.remove("online");
          }
        });
    }
  </script>
</body>
</html>
