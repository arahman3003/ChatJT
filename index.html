<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forum Chat</title>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #111827, #020617);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .chat-container {
      width: 100%;
      max-width: 850px;
      height: 90vh;
      background: rgba(15, 23, 42, 0.96);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.55);
    }

    .chat-header {
      padding: 18px 20px;
      background: rgba(2, 6, 23, 0.92);
      border-bottom: 1px solid rgba(148, 163, 184, 0.22);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .chat-header h1 {
      margin: 0;
      font-size: 22px;
    }

    .chat-header p {
      margin: 5px 0 0;
      color: #94a3b8;
      font-size: 14px;
    }

    .status {
      font-size: 12px;
      padding: 7px 10px;
      border-radius: 999px;
      background: #1e293b;
      color: #cbd5e1;
      white-space: nowrap;
    }

    .status.online {
      background: rgba(34, 197, 94, 0.15);
      color: #86efac;
      border: 1px solid rgba(34, 197, 94, 0.35);
    }

    .name-box {
      display: flex;
      gap: 10px;
      padding: 15px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
      background: #0f172a;
    }

    input {
      flex: 1;
      padding: 13px;
      border: none;
      border-radius: 12px;
      outline: none;
      background: #1e293b;
      color: white;
      font-size: 15px;
    }

    input::placeholder {
      color: #94a3b8;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 13px 17px;
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #16a34a;
      transform: translateY(-1px);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background:
        radial-gradient(circle at top left, rgba(34, 197, 94, 0.08), transparent 28%),
        radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.08), transparent 28%);
    }

    .message {
      background: #1e293b;
      padding: 12px 14px;
      border-radius: 16px;
      max-width: 78%;
      word-wrap: break-word;
      border: 1px solid rgba(148, 163, 184, 0.12);
    }

    .message.me {
      align-self: flex-end;
      background: #14532d;
      border-color: rgba(134, 239, 172, 0.25);
    }

    .message .user {
      font-weight: bold;
      color: #38bdf8;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .message.me .user {
      color: #86efac;
    }

    .message .text {
      font-size: 15px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .message .time {
      margin-top: 7px;
      font-size: 11px;
      color: #94a3b8;
      text-align: right;
    }

    .chat-form {
      display: flex;
      gap: 10px;
      padding: 15px;
      border-top: 1px solid rgba(148, 163, 184, 0.2);
      background: #0f172a;
    }

    .hidden {
      display: none;
    }

    .empty,
    .error {
      color: #94a3b8;
      text-align: center;
      margin-top: 20px;
    }

    .error {
      color: #f87171;
    }

    @media (max-width: 600px) {
      body {
        padding: 8px;
      }

      .chat-container {
        height: 96vh;
        border-radius: 16px;
      }

      .chat-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .message {
        max-width: 94%;
      }

      .chat-header h1 {
        font-size: 19px;
      }

      .name-box,
      .chat-form {
        gap: 8px;
      }

      button {
        padding: 12px 13px;
      }
    }
  </style>
</head>

<body>
  <div class="chat-container">
    <div class="chat-header">
      <div>
        <h1>Forum Chat</h1>
        <p>Chat realtime menggunakan GitHub + Supabase</p>
      </div>
      <div class="status" id="statusText">Menghubungkan...</div>
    </div>

    <div class="name-box" id="nameBox">
      <input type="text" id="usernameInput" placeholder="Masukkan nama kamu..." />
      <button type="button" onclick="saveName()">Masuk</button>
    </div>

    <div class="messages" id="messages">
      <p class="empty">Memuat pesan...</p>
    </div>

    <form class="chat-form" id="chatForm">
      <input type="text" id="messageInput" placeholder="Tulis pesan..." autocomplete="off" />
      <button type="submit">Kirim</button>
    </form>
  </div>

  <script>
    const SUPABASE_URL = "https://wbzxsvhlhbzusyzbjamp.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_55Jwsh0iRWj-BUAvds_MOQ_NEkwcU0p";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const messagesDiv = document.getElementById("messages");
    const chatForm = document.getElementById("chatForm");
    const messageInput = document.getElementById("messageInput");
    const usernameInput = document.getElementById("usernameInput");
    const nameBox = document.getElementById("nameBox");
    const statusText = document.getElementById("statusText");

    let username = localStorage.getItem("chat_username") || "";

    if (username) {
      nameBox.classList.add("hidden");
    }

    function saveName() {
      const name = usernameInput.value.trim();

      if (!name) {
        alert("Nama tidak boleh kosong");
        return;
      }

      username = name;
      localStorage.setItem("chat_username", username);
      nameBox.classList.add("hidden");
    }

    function formatTime(dateString) {
      const date = new Date(dateString);
      return date.toLocaleString("id-ID", {
        hour: "2-digit",
        minute: "2-digit",
        day: "2-digit",
        month: "short"
      });
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function renderMessage(data) {
      const div = document.createElement("div");
      div.className = "message";

      if (data.username === username) {
        div.classList.add("me");
      }

      div.innerHTML = `
        <div class="user">${escapeHtml(data.username)}</div>
        <div class="text">${escapeHtml(data.message)}</div>
        <div class="time">${formatTime(data.created_at)}</div>
      `;

      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    async function loadMessages() {
      const { data, error } = await supabaseClient
        .from("messages")
        .select("*")
        .order("created_at", { ascending: true })
        .limit(100);

      if (error) {
        messagesDiv.innerHTML = `<p class="error">Gagal memuat pesan: ${escapeHtml(error.message)}</p>`;
        return;
      }

      messagesDiv.innerHTML = "";

      if (!data || data.length === 0) {
        messagesDiv.innerHTML = `<p class="empty">Belum ada pesan. Jadilah yang pertama!</p>`;
        return;
      }

      data.forEach(renderMessage);
    }

    chatForm.addEventListener("submit", async function(e) {
      e.preventDefault();

      if (!username) {
        alert("Masukkan nama dulu");
        return;
      }

      const message = messageInput.value.trim();

      if (!message) return;

      messageInput.value = "";

      const { error } = await supabaseClient
        .from("messages")
        .insert([
          {
            username: username,
            message: message
          }
        ]);

      if (error) {
        alert("Gagal mengirim pesan: " + error.message);
      }
    });

    supabaseClient
      .channel("messages-channel")
      .on(
        "postgres_changes",
        {
          event: "INSERT",
          schema: "public",
          table: "messages"
        },
        function(payload) {
          const emptyText = messagesDiv.querySelector(".empty");
          if (emptyText) {
            messagesDiv.innerHTML = "";
          }

          renderMessage(payload.new);
        }
      )
      .subscribe(function(status) {
        if (status === "SUBSCRIBED") {
          statusText.textContent = "Online";
          statusText.classList.add("online");
        } else {
          statusText.textContent = "Menghubungkan...";
          statusText.classList.remove("online");
        }
      });

    loadMessages();
  </script>
</body>
</html>
